
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>PFAS in MI Recreational Areas
        </title>

        <script>
        var esriConfig = {
            apiKey:process.env.API_KEY ,
        };
        </script>

        <script type="module" src="https://js.arcgis.com/calcite-components/3.3.3/calcite.esm.js"></script>


        <link rel="stylesheet" href="https://js.arcgis.com/4.30/esri/themes/dark/main.css" />
        <script src="https://js.arcgis.com/4.34/"></script>

        <script type="module" src="https://js.arcgis.com/4.34/map-components/"></script>

        <!--styling the page-->
        <style>
            html,
            body,
            #viewDiv {
                padding: 0;
                margin: 0;
                height: 100%;
                width: 100%;
            }
            #information {
                width: 300px;
                background: #fff;
                padding: 20px;
            }
            #optionsDiv {
                background-color: #C1A789; 
                color: black;
                padding: 10px;
                width: 300px;
                opacity: 80%;
            }

            .esri-popup .esri-popup-header .esri-title {
                font-size: 18px;
                font-weight: bolder;
            }

            .esri-popup .esri-popup-body .esri-popup-content {
                font-size: 14px;
            }

        </style>



        <arcgis-map basemap= "topo" center = "-84.67554701694672, 44.749945182717525" zoom= "6"> 
        
            <arcgis-expand slot="top-left" expand-icon="information" autoCollapse= true mode=" floating" collapse-tooltip>
                <div id="information">
                    <b>Information</b> <br />
                    <div id="description">PFAS Placeholder text</div>
                    <div id="outer-container">
                    </div>
                </div>
            </arcgis-expand>
            <arcgis-expand
                slot="top-left"
                mode="floating"
            >
                <arcgis-search
                <!-- all-placeholder= "" -->
                include-default-sources-disabled></arcgis-search>
            </arcgis-expand>
            <arcgis-zoom slot="top-left"></arcgis-zoom>
            <arcgis-locate slot= "top-left"></arcgis-locate>
            <arcgis-expand
                slot="top-right" 
                mode="floating"
            >
                <arcgis-legend></arcgis-legend>
            </arcgis-expand>
            
            <arcgis-expand
                slot="bottom-right" 
                mode="floating"
            >
                <div id= "information">
                    <b>Information</b> <br />
                    <calcite-radio-button-group id="colorMixMode" name="Options" layout="vertical" scale="m">
                    <calcite-label layout="inline">
                        <calcite-radio-button id="original" checked></calcite-radio-button>
                        PFHxA
                    </calcite-label>
                    <calcite-label layout="inline">
                        <calcite-radio-button id="select"></calcite-radio-button>
                        PFOA
                    </calcite-label>
                    <calcite-label layout="inline">
                        <calcite-radio-button id="emphasize"></calcite-radio-button>
                        PFHxS
                    </calcite-label>
                    <calcite-label layout="inline">
                        <calcite-radio-button id="replace"></calcite-radio-button>
                        PFBS
                    </calcite-label>
                    <calcite-label layout="inline">
                        <calcite-radio-button id="replace"></calcite-radio-button>
                        PFNA
                    </calcite-label>
                    <calcite-label layout="inline">
                        <calcite-radio-button id="replace"></calcite-radio-button>
                        PFOA
                    </calcite-label>
                    </calcite-radio-button-group>
                </div>
            </arcgis-expand>

            <arcgis-expand
                slot= "top-right"
                mode= "floating"
            >
                <arcgis-layer-list></arcgis-layer-list>
            </arcgis-expand>

            <arcgis-expand slot="bottom-left">
                <arcgis-basemap-gallery></arcgis-basemap-gallery>
            </arcgis-expand>

        </arcgis-map>

    </head>

    <body>
        <script type="module">

            const[FeatureLayer, PictureMarkerSymbol, Map, GraphicsLayer, query, Query, MapView]= 
                await $arcgis.import([
                    "@arcgis/core/layers/FeatureLayer.js",
                    "@arcgis/core/symbols/PictureMarkerSymbol.js", 
                    "@arcgis/core/Map.js",
                    "@arcgis/core/layers/GraphicsLayer.js",
                    "@arcgis/core/rest/query.js",
                    "@arcgis/core/rest/support/Query.js",
                    "@arcgis/core/views/MapView.js"
            ]);

            const viewElement = document.querySelector("arcgis-map");
            await viewElement.viewOnReady();

            const waterHexbinLayer= new FeatureLayer({
                url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/PFAS_SurfaceWater_2025_10miHexbin/FeatureServer", 
                title: "Mean PFAS Analyte Concentration in Surface Water Sample within 10 mile Hexbin "

            }); 

            viewElement.map.add (waterHexbinLayer, 2)

            const fishHexbinLayer= new FeatureLayer({
                url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/PFAS_FishSampling_2026_10miHexbin/FeatureServer", 
                title: "Mean PFOS Concentration in Fish Contaminant Sample within 10 mile Hexbin "

            }); 

            viewElement.map.add (fishHexbinLayer, 2)

            const fishPFOSLayer= new FeatureLayer({
                url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/PFOS_FishSampling_2026/FeatureServer",
                title: "Fish Contaminant Monitoring Program PFOS Sample Site"
            }); 

            viewElement.map.add (fishPFOSLayer, 1)

            const waterSampleLayer= new FeatureLayer({
                url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/PFAS_SurfaceWater_2025/FeatureServer",
                title: "PFAS Surface Water Sampling Site"
            }); 

            viewElement.map.add (waterSampleLayer, 3)

            // renderer for Park Boundary
            // const parkRenderer = {
            //     type: "simple",  // autocasts as new SimpleRenderer()
            //     symbol: {
            //         type: "simple-fill",  // autocasts as new SimpleMarkerSymbol()
            //         color: "purple",
            //         outline: {  
            //         width: 3,
            //         color: "black"
            //         }
            //     }
            // };

            // Create park boundary layer from feature service 
            const parkLayer = new FeatureLayer({ 
                url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/DNR_Parks_Unit_Boundary/FeatureServer", //URL to Park layer
                // renderer: parkRenderer,
                // title: "Park Boundaries"
               
            });
            
            //adds park layer to map
            viewElement.map.add(parkLayer, 0);

            

        </script>
      

       
    </body>
</html>
