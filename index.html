
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>PFAS in MI Recreational Areas
        </title>

        <script>
        var esriConfig = {
            apiKey:process.env.API_KEY ,
        };
        </script>

        <script type="module" src="https://js.arcgis.com/calcite-components/3.3.3/calcite.esm.js"></script>


        <link rel="stylesheet" href="https://js.arcgis.com/4.30/esri/themes/dark/main.css" />
        <script src="https://js.arcgis.com/4.34/"></script>

        <script type="module" src="https://js.arcgis.com/4.34/map-components/"></script>

        <!--styling the page-->
        <style>
            html,
            body,
            #viewDiv {
                padding: 0;
                margin: 0;
                height: 100%;
                width: 100%;
            }
            #information {
                width: 300px;
                background: #fff;
                padding: 20px;
            }
            #optionsDiv {
                background-color: #C1A789; 
                color: black;
                padding: 10px;
                width: 300px;
                opacity: 80%;
            }

            .esri-popup .esri-popup-header .esri-title {
                font-size: 18px;
                font-weight: bolder;
            }

            .esri-popup .esri-popup-body .esri-popup-content {
                font-size: 14px;
            }

        </style>



        <arcgis-map basemap= "topo" center = "-84.67554701694672, 44.749945182717525" zoom= "7"> 
        
            <arcgis-expand slot="top-left" expand-icon="information" auto-collapse mode=" floating" collapse-tooltip>
                <div id="information">
                    <b>Information</b> <br />
                    <div id="description">PFAS Placeholder text</div>
                    <div id="outer-container">
                    </div>
                </div>
            </arcgis-expand>
            <arcgis-expand
                slot="top-left"
                mode="floating"
                auto-collapse
            >
                <arcgis-search
                <!-- all-placeholder= "" -->
                include-default-sources-disabled></arcgis-search>
            </arcgis-expand>

            <arcgis-zoom slot="top-left"></arcgis-zoom>

            <arcgis-locate slot= "top-left"></arcgis-locate>

            <arcgis-expand
                slot="top-right" 
                mode="floating"
                auto-collapse
            >
                <arcgis-legend></arcgis-legend>
            </arcgis-expand>

            <arcgis-expand
                slot="bottom-right" 
                mode="floating"
                auto-collapse
            >
                <div id= "information">  
                    <div id="description">Select a PFAS Analyte to see whether it is above or below MI's Maximum Contaminant Level (MCL)  </div><br />
                    <b>Surface Water Sample PFAS Analyte</b> <br />
                      <input type="radio" id="layer1" name="layers" value="layer1" checked>
                        <label for="layer1">PFHxA</label><br/>
                        
                        <input type="radio" id="layer2" name="layers" value="layer2" >
                        <label for="layer2">PFOA</label><br/>
                        
                        <input type="radio" id="layer3" name="layers" value="layer3">
                        <label for="layer3">PFHxS</label><br/>

                        <input type="radio" id="layer4" name="layers" value="layer4">
                        <label for="layer4">PFBS</label><br/>

                        <input type="radio" id="layer5" name="layers" value="layer5">
                        <label for="layer5">PFNA</label><br/>

                        <input type="radio" id="layer6" name="layers" value="layer6">
                        <label for="layer6">PFOS</label>

                        <br/>

                        <b>Fish Contaminant PFAS Analyte</b> <br />

                        <input type="radio" id="layer7" name="layers" value="layer7">
                        <label for="layer7">PFOS</label>
                </div>
            </arcgis-expand>

            <arcgis-expand
                slot= "top-right"
                mode= "floating"
                auto-collapse
            >
                <arcgis-layer-list></arcgis-layer-list>
            </arcgis-expand>

            <arcgis-expand slot="bottom-left" auto-collapse>
                <arcgis-basemap-gallery></arcgis-basemap-gallery>
            </arcgis-expand>

        </arcgis-map>

    </head>

    <body>
        <script type="module">

            const[FeatureLayer, PictureMarkerSymbol, Map, GraphicsLayer, query, Query, MapView, UniqueValueRenderer,]= 
                await $arcgis.import([
                    "@arcgis/core/layers/FeatureLayer.js",
                    "@arcgis/core/symbols/PictureMarkerSymbol.js", 
                    "@arcgis/core/Map.js",
                    "@arcgis/core/layers/GraphicsLayer.js",
                    "@arcgis/core/rest/query.js",
                    "@arcgis/core/rest/support/Query.js",
                    "@arcgis/core/views/MapView.js", 
                    "@arcgis/core/renderers/UniqueValueRenderer.js",
                    
            ]);

            const viewElement = document.querySelector("arcgis-map");
            await viewElement.viewOnReady();

            document.querySelector("arcgis-layer-list").listItemCreatedFunction = (event) => {
                const { item } = event;

                // Exclude group layers, otherwise the legend will be displayed twice
                if (item.layer.type != "group") {
                item.panel = {
                    content: "legend",
                    open: true,
                };
                }
            };

            const init = {type: "simple-fill",}
            const colors = ["rgba(211, 84, 0, 0.60)", "rgba(174, 214, 241, 0.70)" ]

            // renderer for pfhxa
            const PFHXArenderer = {
                type: "unique-value",  // autocasts as new unique value renderer
                field: "PFHxA_Above_Below_MCL", 
                // defaultSymbol: {...init, color: colors[2]},

                uniqueValueInfos:[
                    { 
                        label: "Above", 
                        symbol: { ...init, color: colors[0], },
                        value: "Above",  
                    },
                    { 
                        label: "Below", 
                        symbol: { ...init, color: colors[1], }, 
                        value: "Below", 
                     },
                ]

            };

            // renderer for pfoa
            const PFOArenderer = {
                type: "unique-value",  // autocasts as new unique value renderer
                field: "PFOA_Above_Below_MCL", 
                // defaultSymbol: {...init, color: colors[2]},

                uniqueValueInfos:[
                    { 
                        label: "Above", 
                        symbol: { ...init, color: colors[0], },
                        value: "Above"  
                    },
                    { 
                        label: "Below", 
                        symbol: { ...init, color: colors[1] }, 
                        value: "Below", 
                     },
                ]

            };

            // renderer for pfhxs
            const PFHXSrenderer = {
                type: "unique-value",  // autocasts as new unique value renderer
                field: "PFHxS_Above_Below_MCL", 
                // defaultSymbol: {...init, color: colors[2]},

                uniqueValueInfos:[
                    { 
                        label: "Above", 
                        symbol: { ...init, color: colors[0], },
                        value: "Above"  
                    },
                    { 
                        label: "Below", 
                        symbol: { ...init, color: colors[1] }, 
                        value: "Below", 
                     },
                ]

            };

            // renderer for pfbs
            const PFBSrenderer = {
                type: "unique-value",  // autocasts as new unique value renderer
                field: "PFBS_Above_Below_MCL", 
                // defaultSymbol: {...init, color: colors[2]},

                uniqueValueInfos:[
                    { 
                        label: "Above", 
                        symbol: { ...init, color: colors[0], },
                        value: "Above"  
                    },
                    { 
                        label: "Below", 
                        symbol: { ...init, color: colors[1] }, 
                        value: "Below", 
                     },
                ]

            };

            // renderer for pfna
            const PFNArenderer = {
                type: "unique-value",  // autocasts as new unique value renderer
                field: "PFNA_Above_Below_MCL", 
                // defaultSymbol: {...init, color: colors[2]},

                uniqueValueInfos:[
                    { 
                        label: "Above", 
                        symbol: { ...init, color: colors[0], },
                        value: "Above"  
                    },
                    { 
                        label: "Below", 
                        symbol: { ...init, color: colors[1] }, 
                        value: "Below", 
                     },
                ]

            };
         
            // renderer for pfos
            const PFOSrenderer = {
                type: "unique-value",  // autocasts as new unique value renderer
                field: "PFOS_Above_Below_MCL", 
                // defaultSymbol: {...init, color: colors[2]},

                uniqueValueInfos:[
                    { 
                        label: "Above", 
                        symbol: { ...init, color: colors[0], },
                        value: "Above"  
                    },
                    { 
                        label: "Below", 
                        symbol: { ...init, color: colors[1] }, 
                        value: "Below", 
                     },
                ]
            };

            // renderer for pfos
            const PFOSFishrenderer = {
                type: "unique-value",  // autocasts as new unique value renderer
                field: "Above_Below_MCL", 
                // defaultSymbol: {...init, color: colors[2]},

                uniqueValueInfos:[
                    { 
                        label: "Above", 
                        symbol: { ...init, color: colors[0], },
                        value: "Above"  
                    },
                    { 
                        label: "Below", 
                        symbol: { ...init, color: colors[1] }, 
                        value: "Below", 
                     },
                ]
            };

            
            // changing layers with radio buttons
            const layer1= new FeatureLayer({
                url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/PFAS_SurfaceWater_2025_10miHexbin/FeatureServer", 
                title: "Mean PFHxA Concentration in Surface Water Sample within 10 mile Hexbin ",
                renderer: PFHXArenderer, 
                visible:false,
            }); 

             
            layer1.listMode= "hide";
            viewElement.map.add (layer1)

            const layer2= new FeatureLayer({
                url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/PFAS_SurfaceWater_2025_10miHexbin/FeatureServer", 
                title: "Mean PFOA Concentration in Surface Water Sample within 10 mile Hexbin ",
                renderer: PFOArenderer,
                visible: false, 
                
            }); 

            layer2.listMode= "hide";
            viewElement.map.add (layer2)

            const layer3= new FeatureLayer({
                url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/PFAS_SurfaceWater_2025_10miHexbin/FeatureServer", 
                title: "Mean PFHxS Concentration in Surface Water Sample within 10 mile Hexbin ",
                renderer: PFHXSrenderer,
                visible: false,
            
            }); 

            layer3.listMode= "hide";
            viewElement.map.add (layer3)

            const layer4= new FeatureLayer({
                url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/PFAS_SurfaceWater_2025_10miHexbin/FeatureServer", 
                title: "Mean PFBS Concentration in Surface Water Sample within 10 mile Hexbin ",
                renderer: PFBSrenderer,
                visible: false, 

            }); 

            layer4.listMode= "hide";
            viewElement.map.add (layer4)

            const layer5= new FeatureLayer({
                url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/PFAS_SurfaceWater_2025_10miHexbin/FeatureServer", 
                title: "Mean PFNA Concentration in Surface Water Sample within 10 mile Hexbin ",
                renderer: PFNArenderer,
                visible: false, 

            }); 

            layer5.listMode= "hide";
            viewElement.map.add (layer5)

            const layer6= new FeatureLayer({
                url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/PFAS_SurfaceWater_2025_10miHexbin/FeatureServer", 
                title: "Mean PFOS Concentration in Surface Water Sample within 10 mile Hexbin ",
                renderer: PFOSrenderer,
                visible: false, 

            }); 

            layer6.listMode= "hide";
            viewElement.map.add (layer6)

            const layer7= new FeatureLayer({
                url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/PFAS_FishSampling_2026_10miHexbin/FeatureServer", 
                title: "Mean PFOS Concentration in Fish Contaminant Sample within 10 mile Hexbin ", 
                renderer: PFOSFishrenderer, 
                visible: false, 
            }); 

            layer7.listMode= "hide";
            viewElement.map.add (layer7, 2)


            document.querySelectorAll('input[name="layers"]').forEach((radio) => {
                radio.addEventListener('change', (event) => {
                    const selectedLayer = event.target.value;

                    // Hide all layers
                    layer1.visible = false;
                    layer2.visible = false;
                    layer3.visible = false;
                    layer4.visible = false;
                    layer5.visible = false;
                    layer6.visible = false;
                    layer7.visible = false;

                    // Hide all layers
                    layer1.listMode= "hide";
                    layer2.listMode= "hide";
                    layer3.listMode= "hide";
                    layer4.listMode= "hide";
                    layer5.listMode= "hide";
                    layer6.listMode= "hide";
                    layer7.listMode= "hide";

                    // Show the selected layer
                    if (selectedLayer === 'layer1') {
                    layer1.visible = true;
                    layer1.listMode= "show"; 
                    } else if (selectedLayer === 'layer2') {
                    layer2.visible = true;
                    layer2.listMode= "show";
                    } else if (selectedLayer === 'layer3') {
                    layer3.visible = true;
                    layer3.listMode= "show";
                    } else if (selectedLayer === 'layer4') {
                    layer4.visible = true;
                    layer4.listMode= "show";
                    } else if (selectedLayer === 'layer5') {
                    layer5.visible = true;
                    layer5.listMode= "show";
                    } else if (selectedLayer === 'layer6') {
                    layer6.visible = true;
                    layer6.listMode= "show";
                    } else if (selectedLayer === 'layer7') {
                    layer7.visible = true;
                    layer7.listMode= "show";
                    }
                });
            });


            const fishPFOSLayer= new FeatureLayer({
                url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/PFOS_FishSampling_2026/FeatureServer",
                title: "Fish Contaminant Monitoring Program PFOS Sample Site", 
                visible: false
            }); 

            viewElement.map.add (fishPFOSLayer, 1)

            const waterSampleLayer= new FeatureLayer({
                url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/PFAS_SurfaceWater_2025/FeatureServer",
                title: "PFAS Surface Water Sampling Site", 
                visible: false
            }); 

            viewElement.map.add (waterSampleLayer, 1)

            // renderer for Park Boundary
            const parkRenderer = {
                type: "simple",  // autocasts as new SimpleRenderer()
                symbol: {
                    type: "simple-fill",  // autocasts as new SimpleMarkerSymbol()
                    color: "rgba(212, 239, 223, 0.70)", 
                    outline: {  
                    width: 1,
                    color: "#229954"
                    }
                }
            };

            // Define a label for the park units
            const parkLabels = {
                symbol: {
                type: "text",
                color: "rgba(212, 239, 223)",
                haloColor: "#5E8D74",
                haloSize: "2px",
                font: {
                    size: "12px",
                    family: "Noto Sans",
                    style: "italic",
                    weight: "normal",
                },
                },

                labelPlacement: "above-center",
                labelExpressionInfo: {
                expression: "$feature.Facility",
                },
                minScale: 200000,
            };

            // Create park boundary layer from feature service 
            const parkLayer = new FeatureLayer({ 
                url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/DNR_Parks_Unit_Boundary/FeatureServer", //URL to Park layer
                renderer: parkRenderer,
                title: "DNR Park Unit", 
                labelingInfo: [parkLabels],
               
            });

            //adds park layer to map
            viewElement.map.add(parkLayer, 0);


            // renderer for PFAS sites and AOIs
            const aoiRenderer = {
                type: "unique-value",  // autocasts as new unique value renderer
                field: "SiteOrAoi", 

                uniqueValueInfos:[
                    { 
                        label: "Site", 
                        symbol: {
                            type: "simple-marker",  // autocasts as new SimpleMarkerSymbol()
                            size: 6,
                            color: "#E74C3C",
                            outline: {  // autocasts as new SimpleLineSymbol()
                            width: 0.5,
                            color: "white"
                            }
                        },
                        value: "Site"  
                    },
                    { 
                        label: "Area of Interest", 
                        symbol: {
                            type: "simple-marker",  // autocasts as new SimpleMarkerSymbol()
                            size: 6,
                            color: "#8E44AD",
                            outline: {  // autocasts as new SimpleLineSymbol()
                            width: 0.5,
                            color: "white"
                            }
                        },
                        value: "Area of Interest", 
                     },
                ]

            };            

            const aoiPFAS= new FeatureLayer({
                url: "https://services1.arcgis.com/FNjlrOFR0aGJ71Tg/arcgis/rest/services/Michigan_PFAS_Sites_and_Areas_of_Interest_PUBLIC_view/FeatureServer/1", 
                title: "PFAS Emitting Sites and Areas of Interest", 
                renderer: aoiRenderer

            })

            viewElement.map.add(aoiPFAS, 1)


            const boatLaunchLayer= new FeatureLayer({
                url: "https://services3.arcgis.com/Jdnp1TjADvSDxMAX/arcgis/rest/services/PRDBASPublicView/FeatureServer", 
                title: "Boating Access Sites", 
                visible: false

            })

            viewElement.map.add(boatLaunchLayer, 1)

            let troutRenderer = {
                type: "simple",  // autocasts as new SimpleRenderer()
                symbol: {
                    type: "simple-marker",  // autocasts as new SimpleMarkerSymbol()
                    size: 5,
                    color: "#229954",
                    outline: {  // autocasts as new SimpleLineSymbol()
                    width: 0.5,
                    color: "white"
                    }
                }
                };

            const troutTrailsLayer= new FeatureLayer({
                url: "https://services3.arcgis.com/Jdnp1TjADvSDxMAX/arcgis/rest/services/TroutTrailPointsOpenData/FeatureServer/0", 
                title: "DNR Trout Trails", 
                renderer: troutRenderer, 
                visibile: false

            })

            viewElement.map.add(troutTrailsLayer, 1)

        </script>
      

       
    </body>
</html>
